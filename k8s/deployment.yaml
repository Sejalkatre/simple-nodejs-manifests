apiVersion: apps/v1
kind: Deployment

metadata:
  name: simple-nodejs-app
  namespace: demo

spec:
  replicas: 2

  selector:
    matchLabels:
      app: simple-nodejs-app

  template:
    metadata:
      labels:
        app: simple-nodejs-app

    spec:
      containers:
      - name: simple-nodejs-app
        image: YOUR_DOCKERHUB_USERNAME/simple-nodejs-app:latest

        ports:
        - containerPort: 3000
